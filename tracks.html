<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OLYMPIC SOUND - Чарт</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Дополнительные стили для рекламных баннеров */
    body {
      display: flex;
      flex-direction: column;
    }
    
    .content-wrapper {
      display: flex;
      justify-content: center;
      max-width: 1600px;
      margin: 0 auto;
      padding: 0 20px;
      gap: 30px;
      position: relative;
      width: 100%;
    }
    
    .ad-banner {
      position: sticky;
      top: 120px;
      width: 200px;
      height: fit-content;
      align-self: flex-start;
      z-index: 50;
      transition: all 0.3s ease;
    }
    
    .left-ad {
      order: 1;
    }
    
    .right-ad {
      order: 3;
    }
    
    main {
      order: 2;
      flex: 1;
      max-width: 1100px;
      min-width: 0;
    }
    
    .ad-link {
      display: block;
      text-decoration: none;
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      border: 2px solid rgba(245, 179, 66, 0.2);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      background: #14181c;
    }
    
    .ad-img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.4s ease;
    }
    
    .ad-label {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: #a0a8b0;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      letter-spacing: 0.5px;
      border: 1px solid rgba(245, 179, 66, 0.3);
      backdrop-filter: blur(2px);
      transition: all 0.3s ease;
      z-index: 2;
    }
    
    .ad-link:hover {
      border-color: #f5b342;
      box-shadow: 0 20px 35px rgba(245, 179, 66, 0.4);
      transform: scale(1.02);
    }
    
    .ad-link:hover .ad-img {
      transform: scale(1.08);
    }
    
    .ad-link:hover .ad-label {
      background: #f5b342;
      color: #0a0c0f;
    }
    
    .ad-banner.empty .ad-link {
      border: 2px dashed rgba(245, 179, 66, 0.3);
      background: linear-gradient(145deg, #14181c, #1a2128);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 250px;
      cursor: default;
    }
    
    .ad-banner.empty .ad-link::before {
      content: "РЕКЛАМНОЕ МЕСТО";
      color: #f5b342;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 1px;
      opacity: 0.5;
      text-align: center;
      padding: 1rem;
    }
    
    .ad-banner.empty .ad-img,
    .ad-banner.empty .ad-label {
      display: none;
    }
    
    @media (max-width: 1400px) {
      .content-wrapper {
        gap: 20px;
      }
      .ad-banner {
        width: 180px;
      }
    }
    
    @media (max-width: 1200px) {
      .ad-banner {
        width: 160px;
      }
    }
    
    @media (max-width: 1100px) {
      .content-wrapper {
        flex-direction: column;
        align-items: center;
      }
      .ad-banner {
        position: static;
        width: 100%;
        max-width: 300px;
        margin: 10px 0;
      }
      .left-ad {
        order: 2;
      }
      .right-ad {
        order: 3;
      }
      main {
        order: 1;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">OLYMPIC<span>SOUND</span></div>
    <div class="nav-links">
      <a href="index.html">Главная</a>
      <a href="tracks.html" class="active">Чарт</a>
      <a href="albums.html">Альбомы</a>
      <a href="artists.html">Зал славы</a>
      <a href="apply.html">Подать заявку</a>
    </div>
  </nav>

  <div class="content-wrapper">
    <!-- Левый рекламный баннер -->
    <div class="ad-banner left-ad">
      <a href="https://tagger.su/pages/nocturneperfume" target="_blank" rel="nofollow sponsored" class="ad-link">
        <img src="ads/nocturne.png" alt="Рекламное место" class="ad-img">
        <span class="ad-label">РЕКЛАМА</span>
      </a>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <main class="container" style="margin: 0; padding: 2rem 0;">
      <div class="page-header">

          </div>

          </div>
          <div class="track-info">
            <div class="track-title">California Rain</div>

        <!-- Позиция 3 -->

          </div>

            <div class="track-title">eat</div>
            <div class="track-artist">silvain</div>
          </div>
          <div class="track-change change-equal">-</div>
        </div>

        <!-- Позиция 4 -->
        <div class="track-item">
          <div class="track-rank">4</div>
          <div class="track-cover">
            <img src="covers/sle.jpg" alt="Speaking My Peace" style="width: 100%; height: 100%; object-fit: cover; border-radius: 4px;">
          </div>
          <div class="track-info">
            <div class="track-title">Speaking My Peace</div>

        <!-- Позиция 5 -->
        <div class="track-item">
          <div class="track-rank">5</div>
          <div class="track-cover">
            <img src="covers/crazygirl.png" alt="crazy girl" style="width: 100%; height: 100%; object-fit: cover; border-radius: 4px;">
          </div>
          <div class="track-info">
            <div class="track-title">crazy girl</div>
            <div class="track-artist">kawaii</div>
          </div>
          <div class="track-change change-up">⬆️</div>
        </div>
      </div>
    </main>

    <!-- Правый рекламный баннер -->
    <div class="ad-banner right-ad">
      <a href="#" target="_blank" rel="nofollow sponsored" class="ad-link">
        <img src="ads/test.png" alt="Рекламное место" class="ad-img">
        <span class="ad-label">РЕКЛАМА</span>
      </a>
    </div>
  </div>
</body>
</html>
